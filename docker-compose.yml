version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:4000

  backend:
    # Descomenta la línea de abajo cuando tengan el backend listo:
    # build: ./backend
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'Backend placeholder - reemplazar con el build real'"
    ports:
      - "4000:4000"

  # Este volumen especial permite que el backend controle Docker
  # (crear/eliminar contenedores de microservicios dinámicamente)
networks:
  default:
    name: microservices-net

volumes:
  docker-socket: